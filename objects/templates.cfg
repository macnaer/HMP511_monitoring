# Define a template for cameras that we can reuse
define host{
        name                    generic-camera
        use                     generic-host
        check_period            24x7
        check_interval          3          
        retry_interval          1
        max_check_attempts      2                
        check_command           check-host-alive
        notification_period     24x7
        notification_interval   60               
        notification_options    d,u,r           
        contact_groups          admins
        flap_detection_enabled  1                
        process_perf_data       0                
        icon_image              camera.png       
        statusmap_image         camera.gd2
        notes                   "Network camera monitored via ping/SNMP"
        register                0
}