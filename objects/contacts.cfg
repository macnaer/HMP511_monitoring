define contact {
    contact_name                    R2D2
    alias                           R2D2 Bot
    service_notification_period      24x7
    host_notification_period         24x7
    service_notification_options     w,u,c,r
    host_notification_options        d,r
    service_notification_commands    notify-service-by-r2d2
    host_notification_commands       notify-host-by-r2d2
}

# --- Contact Group ---
define contactgroup {
    contactgroup_name    admins
    alias                Nagios Administrators
    members              R2D2
}