# ============================================================
# Nagios Service Definitions - Network Checks
# ============================================================
# Import these definitions in your nagios.cfg
# Adjust hostgroup_name, interfaces, and thresholds as needed

# --- Interface Status ---
define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     Interface eth0 Status
    check_command           check_interface_status!eth0
}

define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     Interface ens192 Status
    check_command           check_interface_status!ens192
}

# --- Bandwidth Usage ---
define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     Bandwidth eth0
    check_command           check_bandwidth!eth0!80!95
}

# --- Errors and Drops ---
define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     Errors eth0
    check_command           check_errors!eth0!100!1000
}
