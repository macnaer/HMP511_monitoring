# ============================================================
# Nagios Service Definitions - SNMP Checks
# ============================================================
# Import these definitions in your nagios.cfg
# Adjust hostgroup_name and thresholds as needed

# --- Hikvision Camera Checks ---
define service {
    use                     generic-service
    hostgroup_name          cams
    service_description     Camera Uptime
    check_command           check_snmp_hikvision!uptime
}

define service {
    use                     generic-service
    hostgroup_name          cams
    service_description     Camera Storage
    check_command           check_snmp_hikvision!storage!80!90
}

define service {
    use                     generic-service
    hostgroup_name          cams
    service_description     Camera Temperature
    check_command           check_snmp_hikvision!temperature!40!50
}

# --- Cisco Switch Checks ---
define service {
    use                     generic-service
    hostgroup_name          switches
    service_description     Switch Temperature
    check_command           check_snmp_cisco!temperature!35!45
}

define service {
    use                     generic-service
    hostgroup_name          switches
    service_description     Switch Fan Status
    check_command           check_snmp_cisco!fan
}

define service {
    use                     generic-service
    hostgroup_name          switches
    service_description     Switch PSU Status
    check_command           check_snmp_cisco!psu
}

define service {
    use                     generic-service
    hostgroup_name          switches
    service_description     Switch CPU Usage
    check_command           check_snmp_cisco!cpu!70!90
}

define service {
    use                     generic-service
    hostgroup_name          switches
    service_description     Switch Storage Usage
    check_command           check_snmp_cisco!storage!80!90
}

define service {
    use                     generic-service
    hostgroup_name          switches
    service_description     Switch Uptime
    check_command           check_snmp_cisco!uptime
}
