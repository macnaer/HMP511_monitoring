# ============================================================
# Nagios Service Definitions - System Checks
# ============================================================
# Import these definitions in your nagios.cfg
# Adjust hostgroup_name and thresholds as needed

# --- CPU Check ---
define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     CPU Usage
    check_command           check_cpu!80!95
}

# --- Memory Check ---
define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     Memory Usage
    check_command           check_memory!80!95
}

# --- Disk Check (Root Partition) ---
define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     Disk Usage /
    check_command           check_disk!/!80!90
}

# --- Disk Check (Data Partition) ---
define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     Disk Usage /data
    check_command           check_disk!/data!80!90
}

# --- Load Average ---
define service {
    use                     generic-service
    hostgroup_name          linux_servers
    service_description     System Load
    check_command           check_load!4.0!8.0
}
